services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    hostname: nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "70MB"
  api1:
    build: .
    container_name: api1
    hostname: api1
    environment:
      PORT: 9999
    expose:
      - "9999"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "140MB"
  api2:
    build: .
    container_name: api2
    hostname: api2
    environment:
      PORT: 9999
    expose:
      - "9999"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "140MB"